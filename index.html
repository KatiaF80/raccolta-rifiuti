<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raccolta rifiuti – Comune di Cesana Brianza</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f4f7;
  color: #000;
  margin: 0;
  padding: 20px;
}
h1 { text-align: center; margin-bottom: 6px; }
h2 { text-align: center; font-weight: normal; color: #444; margin-top: 0; }

.card {
  background: #fff;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 18px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}
.data { font-weight: 600; margin-bottom: 6px; }

/* colori ufficiali */
.indiff { color: #424242; }
.carta { color: #1565c0; }
.viola { color: #7b1fa2; }
</style>
</head>

<body>

<h1>🗑️ Raccolta rifiuti</h1>
<h2>Comune di Cesana Brianza</h2>

<div id="contenuto"></div>

<script>
// 📌 Data certa dal PDF SILEA:
// Venerdì 3 aprile 2026 = CARTA + UMIDO + VETRO
const riferimentoVenerdiCarta = new Date("2026-04-03");

function giorniTra(date1, date2) {
  const msGiorno = 1000 * 60 * 60 * 24;
  return Math.floor((date1 - date2) / msGiorno);
}

function raccolta(date) {
  const giorno = date.getDay(); // 0 dom, 1 lun, 2 mar, ..., 6 sab

  // ✅ MARTEDÌ
  if (giorno === 2) {
    return { testo: "Indifferenziato + Umido", cls: "indiff" };
  }

  // ✅ VENERDÌ (alternanza)
  if (giorno === 5) {
    const diff = giorniTra(date, riferimentoVenerdiCarta);
    const settimane = Math.floor(diff / 7);
    if (settimane % 2 === 0) {
      return { testo: "Carta + Umido + Vetro", cls: "carta" };
    } else {
      return { testo: "Viola + Umido", cls: "viola" };
    }
  }

  // ❌ Tutti gli altri giorni: niente raccolta
  return null;
}

function formatDate(d) {
  return d.toLocaleDateString("it-IT", {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric"
  });
}

const box = document.getElementById("contenuto");
let trovati = 0;
let offset = 0;

// ✅ MOSTRA I PROSSIMI 3 GIORNI REALI DI RACCOLTA
while (trovati < 3) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  const r = raccolta(d);

  if (r) {
    box.innerHTML += `
      <div class="card">
        <div class="data">📅 ${formatDate(d)}</div>
        <div class="${r.cls}">🗑️ ${r.testo}</div>
      </div>`;
    trovati++;
  }
  offset++;
}
</script>

</body>
</html>
