<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raccolta rifiuti – Comune di Cesana Brianza</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f4f7;
  color: #000;
  margin: 0;
  padding: 20px;
}
h1 {
  text-align: center;
  margin-bottom: 6px;
}
h2 {
  text-align: center;
  font-weight: normal;
  color: #444;
  margin-top: 0;
  margin-bottom: 22px;
}
.card {
  background: #fff;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 18px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}
.data {
  font-weight: 600;
  margin-bottom: 6px;
}

/* colori ufficiali */
.umido { color: #2e7d32; }
.carta { color: #1565c0; }
.indiff { color: #424242; }
</style>
</head>

<body>

<h1>🗑️ Raccolta rifiuti</h1>
<h2>Comune di Cesana Brianza</h2>

<div id="contenuto"></div>

<script>
/*
  Calendario CESANA BRIANZA – SILEA (da PDF ufficiale)

  ✅ Lunedì    → Indifferenziato + Umido
  ✅ Martedì   → Indifferenziato + Umido
  ❌ Mercoledì → Nulla
  ❌ Giovedì   → Nulla
  ✅ Venerdì   → Carta + Umido + Vetro
  ❌ Sabato    → Nulla
  ❌ Domenica  → Nulla
*/

function raccolta(date) {
  const g = date.getDay(); // 0 = domenica, 1 = lunedì, ..., 6 = sabato

  if (g === 1 || g === 2) {
    return { testo: "Indifferenziato + Umido", cls: "indiff" };
  }

  if (g === 5) {
    return { testo: "Carta + Umido + Vetro", cls: "carta" };
  }

  return null; // tutti gli altri giorni non hanno raccolta
}

function formatDate(d) {
  return d.toLocaleDateString("it-IT", {
    weekday: "long",
    day: "numeric",
    month: "long"
  });
}

const box = document.getElementById("contenuto");
let found = 0;
let offset = 0;

// ✅ MOSTRA I PROSSIMI 3 GIORNI CON RACCOLTA
while (found < 3) {
  const d = new Date();
  d.setDate(d.getDate() + offset);

  const r = raccolta(d);
  if (r) {
    box.innerHTML += `
      <div class="card">
        <div class="data">📅 ${formatDate(d)}</div>
        <div class="${r.cls}">🗑️ ${r.testo}</div>
      </div>`;
    found++;
  }
  offset++;
}
</script>

</body>
</html>
