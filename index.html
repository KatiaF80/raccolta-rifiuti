<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raccolta rifiuti – Cesana Brianza</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f4f7;
  color: #000;
  margin: 0;
  padding: 20px;
}
h1 { text-align: center; }
h2 {
  text-align: center;
  font-weight: normal;
  color: #444;
}
.card {
  background: #fff;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 18px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}
.data { font-weight: 600; margin-bottom: 6px; }

.umido { color: #2e7d32; }
.carta { color: #1565c0; }
.indiff { color: #424242; }
</style>
</head>

<body>

<h1>🗑️ Raccolta rifiuti</h1>
<h2>Comune di Cesana Brianza</h2>

<div id="contenuto"></div>

<script>
// Calendario SILEA – Cesana Brianza
function raccolta(date) {
  const g = date.getDay(); // 0 dom, 1 lun, ..., 6 sab

  if (g === 1 || g === 2) {
    return { testo: "Indifferenziato + Umido", cls: "indiff" };
  }
  if (g === 5) {
    return { testo: "Carta + Umido + Vetro", cls: "carta" };
  }
  if (g === 6) {
    return { testo: "Umido", cls: "umido" };
  }
  return null; // nessuna raccolta
}

function formatDate(d) {
  return d.toLocaleDateString("it-IT", {
    weekday: "long",
    day: "numeric",
    month: "long"
  });
}

const box = document.getElementById("contenuto");
let found = 0;
let offset = 0;

// ✅ ORA MOSTRA 3 GIORNI UTILI
while (found < 3) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  const r = raccolta(d);

  if (r) {
    box.innerHTML += `
      <div class="card">
        <div class="data">📅 ${formatDate(d)}</div>
        <div class="${r.cls}">🗑️ ${r.testo}</div>
      </div>`;
    found++;
  }
  offset++;
}
</script>

</body>
</html>
